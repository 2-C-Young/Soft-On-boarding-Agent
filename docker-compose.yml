
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: soa-backend
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=YOUR_SUPER_SECRET_JWT_KEY_FOR_SOFT_ONBOARDING_AGENT_256_BITS
      - APP_OAUTH2_REDIRECT_URI=/login
    env_file:
      - ./backend/.env
    networks:
      - soa-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: soa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - soa-network

networks:
  soa-network:
    driver: bridge
